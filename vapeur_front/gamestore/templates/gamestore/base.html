<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPEUR - The Digital Game Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1b2838; color: #c7d5e0; }
        .steam-bg { background-color: #171a21; }
        .steam-card { background-color: #2a475e; }
        .steam-btn { background: linear-gradient( to right, #47bfff 5%, #1a44c2 60%); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Navigation -->
    <nav class="steam-bg p-4 shadow-lg border-b border-gray-700">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-3xl font-bold tracking-widest text-white uppercase">VAPEUR</a>
            <div class="space-x-6">
                <a href="{% url 'home' %}" class="hover:text-blue-400 transition">Store</a>
                {% if user.is_authenticated %}
                    <span class="text-blue-300">Hello, {{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="hover:text-red-400 transition">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:text-blue-400 transition">Login</a>
                    <a href="{% url 'signup' %}" class="steam-btn px-4 py-2 rounded text-white font-semibold hover:opacity-90 transition">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="container mx-auto mt-4 px-4">
        {% for message in messages %}
        <div class="p-3 rounded {% if message.tags == 'success' %}bg-green-600{% else %}bg-red-600{% endif %} text-white mb-2">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Content -->
    <main class="flex-grow container mx-auto p-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="steam-bg p-8 mt-auto border-t border-gray-700">
        <div class="container mx-auto text-center text-gray-500 text-sm">
            &copy; 2026 VAPEUR. Powered by Django Microservices.
        </div>
    </footer>

</body>
</html>
